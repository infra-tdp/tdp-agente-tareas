# =============================================================================
#  TDP Agente de tareas — stack COMPLETO para Coolify (build en cada push).
#
#  Coolify es EFÍMERO: nada se configura a mano en su UI. Este compose define
#  TODAS las apps del stack (agente + Evolution API + Redis, y n8n opcional);
#  las variables viven en GitHub (Secrets del repo) y el workflow
#  .github/workflows/deploy.yml crea el recurso por API, sincroniza las envs,
#  asigna dominios (docker_compose_domains) y lanza el deploy. Para reconstruir
#  un Coolify nuevo: ejecutar el workflow con action=bootstrap. Ver
#  docs/despliegue.md.
#
#  Datos persistentes SIEMPRE fuera del host: PostgreSQL gestionada de UpCloud
#  (agente y Evolution; la sesión de WhatsApp sobrevive en BD a la pérdida del
#  host). Redis es solo caché (perderlo no rompe nada).
# =============================================================================
services:
  agente:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: "${DATABASE_URL}"
      DATABASE_CA_CERT: "${DATABASE_CA_CERT:-}"
      # Evolution corre en este mismo compose: se habla por la red interna.
      EVOLUTION_API_URL: "${EVOLUTION_API_URL:-http://evolution:8080}"
      EVOLUTION_API_KEY: "${EVOLUTION_API_KEY}"
      EVOLUTION_INSTANCE: "${EVOLUTION_INSTANCE:-tdp-tareas}"
      AGENT_WEBHOOK_TOKEN: "${AGENT_WEBHOOK_TOKEN}"
      AGENT_ADMIN_TOKEN: "${AGENT_ADMIN_TOKEN}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
      ANTHROPIC_MODEL: "${ANTHROPIC_MODEL:-claude-sonnet-5}"
      ANTHROPIC_MEDIA_MODEL: "${ANTHROPIC_MEDIA_MODEL:-claude-haiku-4-5-20251001}"
      STT_API_URL: "${STT_API_URL:-https://api.openai.com/v1}"
      STT_API_KEY: "${STT_API_KEY:-}"
      STT_MODEL: "${STT_MODEL:-whisper-1}"
      TASK_PROVIDER: "${TASK_PROVIDER:-jira}"
      JIRA_BASE_URL: "${JIRA_BASE_URL}"
      JIRA_EMAIL: "${JIRA_EMAIL}"
      JIRA_API_TOKEN: "${JIRA_API_TOKEN}"
      JIRA_PROJECT_KEY: "${JIRA_PROJECT_KEY}"
      JIRA_ISSUE_TYPE: "${JIRA_ISSUE_TYPE:-Task}"
      N8N_EVENTS_WEBHOOK_URL: "${N8N_EVENTS_WEBHOOK_URL:-}"
    volumes:
      - agente_data:/data
    expose:
      - "3100"
    networks:
      - app
      - coolify
    labels:
      - "traefik.docker.network=coolify"
    security_opt: [no-new-privileges:true]
    depends_on:
      - evolution
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3100/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ---------------------------------------------------------------------------
  # Evolution API — pasarela WhatsApp. Persistencia COMPLETA en la PostgreSQL
  # gestionada (instancias, sesión, mensajes): el contenedor puede morir y la
  # instancia vuelve conectada sin re-escanear el QR.
  # ---------------------------------------------------------------------------
  evolution:
    image: "${EVOLUTION_IMAGE:-evoapicloud/evolution-api:v2.3.1}"
    restart: unless-stopped
    environment:
      SERVER_URL: "https://${EVOLUTION_DOMAIN}"
      AUTHENTICATION_API_KEY: "${EVOLUTION_API_KEY}"
      CONFIG_SESSION_PHONE_CLIENT: "${CONFIG_SESSION_PHONE_CLIENT:-TDP}"
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: "postgresql"
      DATABASE_CONNECTION_URI: "${EVOLUTION_DATABASE_URL}"
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "false"
      DATABASE_SAVE_DATA_CONTACTS: "true"
      DATABASE_SAVE_DATA_CHATS: "true"
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: "redis://redis:6379/6"
      CACHE_REDIS_PREFIX_KEY: "evolution"
      CACHE_LOCAL_ENABLED: "false"
      LOG_LEVEL: "${EVOLUTION_LOG_LEVEL:-ERROR,WARN,INFO}"
    expose:
      - "8080"
    networks:
      - app
      - coolify
    labels:
      - "traefik.docker.network=coolify"
    security_opt: [no-new-privileges:true]
    depends_on:
      - redis
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

  # Caché de Evolution — efímero a propósito (sin volumen).
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    networks: [app]
    security_opt: [no-new-privileges:true]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # N8N (OPCIONAL, fase 4 del roadmap) — se activa añadiendo el secret
  # COMPOSE_PROFILES=n8n (el workflow lo sincroniza como env del recurso).
  # Estado en la PostgreSQL gestionada; N8N_ENCRYPTION_KEY fija para que las
  # credenciales guardadas sobrevivan a la recreación del contenedor.
  # ---------------------------------------------------------------------------
  n8n:
    profiles: ["n8n"]
    image: "${N8N_IMAGE:-docker.n8n.io/n8nio/n8n:1.76.1}"
    restart: unless-stopped
    environment:
      N8N_HOST: "${N8N_DOMAIN:-}"
      N8N_PROTOCOL: "https"
      WEBHOOK_URL: "https://${N8N_DOMAIN:-}"
      N8N_ENCRYPTION_KEY: "${N8N_ENCRYPTION_KEY:-}"
      DB_TYPE: "postgresdb"
      DB_POSTGRESDB_DATABASE: "${N8N_DB_NAME:-n8n}"
      DB_POSTGRESDB_HOST: "${N8N_DB_HOST:-}"
      DB_POSTGRESDB_PORT: "${N8N_DB_PORT:-5432}"
      DB_POSTGRESDB_USER: "${N8N_DB_USER:-n8n}"
      DB_POSTGRESDB_PASSWORD: "${N8N_DB_PASSWORD:-}"
      DB_POSTGRESDB_SSL_ENABLED: "${N8N_DB_SSL:-true}"
      DB_POSTGRESDB_SSL_REJECT_UNAUTHORIZED: "false"
      GENERIC_TIMEZONE: "Europe/Madrid"
    volumes:
      - n8n_data:/home/node/.n8n
    expose:
      - "5678"
    networks:
      - app
      - coolify
    labels:
      - "traefik.docker.network=coolify"
    security_opt: [no-new-privileges:true]

  # Solo desarrollo local (docker compose --profile local-db up); en producción
  # la BD es la gestionada de UpCloud.
  db:
    profiles: ["local-db"]
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-tdp}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB:-tdp_agente}"
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks: [app]
    security_opt: [no-new-privileges:true]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tdp} -d ${POSTGRES_DB:-tdp_agente}"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  pg_data:
  agente_data:
  n8n_data:

networks:
  app:
  coolify:
    external: true
